<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang="title" data-version></title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="notebook-container">
        <div class="notebook closed-front" id="notebook">
            <div class="spine"></div> <!-- Lombada do caderno -->

            <div class="page left is-closed" id="page-left">
                <div class="card front">
                    <div class="cover-inner"></div>
                    <div class="sheet" id="sheet-left"></div>
                </div>
                <!-- Abaixo fica o que é exibido na capa do caderno -->
                <div class="card back">
                    <div class="cover-outer">
                        <div class="cover-title" data-lang="notebook/title/start"></div>
                    </div>
                </div>
            </div>

            <div class="page right" id="page-right">
                <div class="card front">
                    <div class="cover-inner"></div>
                    <div class="sheet" id="sheet-right"></div>
                </div>
                <!-- Abaixo fica o que é exibido na capa de trás do caderno -->
                <div class="card back">
                    <div class="cover-outer">
                        <div class="cover-title" data-lang="notebook/title/end"></div>
                    </div>
                </div>
            </div>

            <!-- Página de animação do caderno -->
            <div class="page animated" id="animated">
                <div class="card front">
                    <div class="sheet anim front" id="anim-front"></div>
                </div>
                <div class="card back">
                    <div class="sheet anim back" id="anim-back"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <!-- <button id="openBtn" data-lang="controls/btn/open"></button> -->
        <button id="prevBtn" onclick="handlePrev()" data-lang="controls/btn/prev"></button>
        <button id="nextBtn" onclick="handleNext()" data-lang="controls/btn/next"></button>
    </div>

    <script src="languages.js"></script>
    <script src="main.js"></script>
</body>

</html>
