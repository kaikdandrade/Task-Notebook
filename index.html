<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBook</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="notebook-container">
        <div class="notebook" id="notebook">

            <div class="cover cover-left"></div>
            <div class="cover cover-right"></div>

            <div class="static-page left-page sheet" id="page-left">
            </div>

            <div class="animated-page sheet" id="animated-page">
                <div class="front" id="anim-front">
                </div>
                <div class="back" id="anim-back">
                </div>
            </div>

            <div class="static-page right-page sheet" id="page-right">
            </div>

        </div>
    </div>

    <div class="controls">
        <button id="prevBtn" onclick="prevPage()">Anterior</button>
        <button id="nextBtn" onclick="nextPage()">Próximo</button>
    </div>

    <script src="main.js"></script>
</body>

</html>
