<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang="title" data-version></title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="notebook-container">
        <div class="notebook">
            <div class="spine"></div> <!-- Lombada do caderno -->

            <section class="page left" id="page-left">
                <div class="card front">
                    <div class="cover-inner"></div>
                    <div class="sheet" id="sheet-left"></div>
                </div>
                <!-- Abaixo fica o que é exibido na capa do caderno -->
                <div class="card back">
                    <div class="cover-outer">
                        <div class="cover-title">
                            <h1 data-lang="notebook/title/start"></h1>
                        </div>
                        <button id="openBtn" onclick="handleBookInteraction('toggle')" class="btn"
                            data-lang="notebook/controls/btn/toggle"></button>
                    </div>
                </div>
            </section>

            <section class="page right" id="page-right">
                <div class="card front">
                    <div class="cover-inner"></div>
                    <div class="sheet" id="sheet-right"></div>
                </div>
                <!-- Abaixo fica o que é exibido na capa de trás do caderno -->
                <div class="card back">
                    <div class="cover-outer">
                        <div class="cover-title">
                            <h3 data-lang="notebook/title/end"></h3>
                        </div>
                        <button id="openBtn" onclick="handleBookInteraction('toggle')" class="btn"
                            data-lang="notebook/controls/btn/toggle"></button>
                    </div>
                </div>
            </section>

            <!-- Página de animação do caderno -->
            <section class="page animated" id="animated">
                <div class="card front">
                    <div class="sheet anim front" id="anim-front"></div>
                </div>
                <div class="card back">
                    <div class="sheet anim back" id="anim-back"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="languages.js"></script>
    <script src="main.js"></script>
</body>

</html>
