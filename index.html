<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBook</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="input-bar">
        <input type="text" id="taskInput" placeholder="Sua próxima tarefa crítica...">
        <button class="add-btn" onclick="addTask()">Adicionar</button>
    </div>

    <div class="notebook-box">
        <!-- Folha da Animação -->
        <div class="flip-sheet" id="flipSheet">
            <div class="sheet-face front"></div>
            <div class="sheet-face back"></div>
        </div>

        <div class="notebook-inner">
            <!-- Página Esquerda -->
            <div class="page left">
                <div class="page-title" id="leftTitle">Informações</div>
                <div class="paper-grid" id="leftContent"></div>
            </div>

            <!-- Página Direita -->
            <div class="page right">
                <div class="page-title" id="rightTitle">Tarefas</div>
                <div class="paper-grid" id="rightContent"></div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
