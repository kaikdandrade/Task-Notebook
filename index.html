<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBook</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="notebook-container">
        <div class="notebook closed-front" id="notebook">
            <div class="spine"></div>

            <div class="side left-side is-closed" id="left-side">
                <div class="card-face face-front">
                    <div class="cover-inner"></div>
                    <div class="sheet page-left" id="page-left"></div>
                </div>
                <div class="card-face face-back">
                    <div class="cover-outer">
                        <div class="cover-title">MY TASKS</div>
                    </div>
                </div>
            </div>

            <div class="side right-side" id="right-side">
                <div class="card-face face-front">
                    <div class="cover-inner"></div>
                    <div class="sheet page-right" id="page-right"></div>
                </div>
                <div class="card-face face-back">
                    <div class="cover-outer">
                        <div class="cover-title">THE END</div>
                    </div>
                </div>
            </div>

            <div class="animated-page" id="animated-page">
                <div class="card-face face-front">
                    <div class="sheet anim-front" id="anim-front"></div>
                </div>
                <div class="card-face face-back">
                    <div class="sheet anim-back" id="anim-back"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn" onclick="handlePrev()">Anterior</button>
        <button id="nextBtn" onclick="handleNext()">Abrir Caderno</button>
    </div>

    <script src="main.js"></script>
</body>

</html>
